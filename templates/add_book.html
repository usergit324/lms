<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Book</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="signup-container">

        <form action="/add_book"
              method="POST"
              class="signup-form">

            <h2 class="text-center mb-4">
                Add New Book
            </h2>

            <input type="text"
                   name="title"
                   class="form-control"
                   placeholder="Enter Book Title"
                   required>

            <input type="text"
                   name="author"
                   class="form-control"
                   placeholder="Enter Author Name"
                   required>

            <input type="text"
                   name="category"
                   class="form-control"
                   placeholder="Enter Book Category"
                   required>

            <input type="number"
                   name="quantity"
                   class="form-control"
                   placeholder="Enter Quantity"
                   required>

            <button type="submit"
                    class="btn btn-primary w-100 mt-3">
                Add Book
            </button>

            <a href="/dashboard"
               class="btn btn-dark w-100 mt-3">
                Back To Dashboard
            </a>

        </form>

    </div>

</body>
</html>
