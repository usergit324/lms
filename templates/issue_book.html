<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Issue Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="signup-container">
        <form action="/issue_book"
              method="POST"
              class="signup-form">
            <h2 class="text-center mb-4">
                Issue Book
            </h2>
            <input type="text"
                   name="student_name"
                   class="form-control"
                   placeholder="Enter Student Name"
                   required>
            <input type="text"
                   name="book_title"
                   class="form-control"
                   placeholder="Enter Book Title"
                   required>
            <input type="date"
                   name="issue_date"
                   class="form-control"
                   required>
            <button type="submit"
                    class="btn btn-warning w-100 mt-3">
                Issue Book
            </button>
            <a href="/dashboard"
               class="btn btn-dark w-100 mt-3">
                Back To Dashboard
            </a>
        </form>
    </div>
</body>
</html>
