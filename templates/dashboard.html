<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="dashboard-container">

        <div class="dashboard-box">

            <h1 class="dashboard-heading">
                Library Dashboard
            </h1>

            <p class="dashboard-text">
                Welcome to the Library Management System
            </p>

            <div class="d-grid gap-3 mt-4">
                <a href="/add_book" class="btn btn-primary btn-lg">Add Books</a>
                <a href="/view_books" class="btn btn-success btn-lg">View Books</a>
                <a href="/issue_book" class="btn btn-warning btn-lg">Issue Books</a>
                <a href="/return_book" class="btn btn-info btn-lg">Return Books</a>
                <a href="/login"
                   class="btn btn-danger btn-lg">
                    Logout
                </a>

            </div>

        </div>

    </div>

</body>
</html>
